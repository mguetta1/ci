name: Run Koncur with kantra config e2e

on:
  workflow_call:
    inputs:
      skip_build:
        description: "Skip building images, use existing release images from quay.io"
        required: false
        type: boolean
        default: false
      image_tag:
        description: "Image tag to use when skip_build=true (e.g., 'latest', 'release-0.9')"
        required: false
        type: string
      repo:
        description: "Repository to build images from (used when skip_build=false)"
        required: false
        type: string
      ref:
        description: "Ref to build images from (used when skip_build=false)"
        required: false
        type: string
      koncur_repo:
        description: "Koncur repository to checkout (e.g., 'mguetta1/koncur' for forks)"
        required: false
        type: string
        default: konveyor/koncur
      koncur_ref:
        description: "Koncur ref to checkout (e.g., branch, tag, or SHA)"
        required: false
        type: string
  workflow_dispatch:
    inputs:
      skip_build:
        description: "Skip building images, use existing release images from quay.io"
        required: false
        type: boolean
        default: false
      image_tag:
        description: "Image tag to use when skip_build=true (e.g., 'latest', 'release-0.9')"
        required: false
        type: string
      repo:
        description: "Repository to build images from (used when skip_build=false)"
        required: false
        type: string
      ref:
        description: "Ref to build images from (used when skip_build=false)"
        required: false
        type: string
        default: main
      koncur_repo:
        description: "Koncur repository to checkout (e.g., 'mguetta1/koncur' for forks)"
        required: false
        type: string
      koncur_ref:
        description: "Koncur ref to checkout"
        required: false
        type: string 

jobs:

  build-images:
    if: ${{ !inputs.skip_build }}
    uses: ./.github/workflows/e2e-image-build.yaml
    with:
      repo: ${{ inputs.repo || github.repository }}
      ref: ${{ inputs.ref || github.ref }}
    secrets: inherit

  run-koncur-action:
    needs:
      - build-images
    if: ${{ always() && (needs.build-images.result == 'success' || needs.build-images.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - os: "linux"
            runner: "ubuntu-24.04-arm"
          - os: "macos"
            runner: "macos-26-large"
          - os: "windows"
            runner: "windows-latest"
        exclude:
          - os:
              os: "macos"
              runner: "macos-26-large"
    runs-on: ${{ matrix.os.runner }}
    steps:
      - name: Run Koncur Testing
        id: koncur-test
        uses: konveyor/ci/koncur-kantra@main
        with:
          os: ${{ matrix.os.os }}
          image_pattern: ${{ !inputs.skip_build && format('*{{kantra,provider}}--{0}', github.run_id) || '' }}
          image_tag: ${{ inputs.skip_build && inputs.image_tag || '' }}
          koncur_repo: ${{ inputs.koncur_repo || 'konveyor/koncur' }}
          ref: ${{ inputs.koncur_ref || github.base_ref || inputs.ref || github.ref_name }}

